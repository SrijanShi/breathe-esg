app = "breathe-esg-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  DJANGO_SETTINGS_MODULE = "config.settings.production"
  PORT = "8080"
  COOKIE_SECURE = "True"
  COOKIE_SAMESITE = "None"

[deploy]
  release_command = "/bin/sh -c 'python manage.py migrate --noinput && python manage.py seed_factors && python manage.py create_demo'"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1


[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
